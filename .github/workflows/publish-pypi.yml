name: Publish PyPI Package

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.0"

      - name: Build wheel and source distribution
        run: uv build --no-sources

      - name: Smoke test built wheel and source distribution
        shell: bash
        run: |
          set -euo pipefail

          smoke_check() {
            local artifact="$1"
            local venv_dir="$2"

            python -m venv "${venv_dir}"
            "${venv_dir}/bin/python" -m pip install --no-deps "${artifact}"
            "${venv_dir}/bin/python" - <<'PY'
          import inspect

          from card_framework import InferenceResult, infer

          assert callable(infer)
          assert InferenceResult.__name__ == "InferenceResult"
          assert tuple(inspect.signature(infer).parameters) == (
              "audio_wav",
              "output_dir",
              "target_duration_seconds",
              "device",
              "vllm_url",
              "vllm_api_key",
          )
          PY
          }

          smoke_check "$(find dist -maxdepth 1 -name '*.whl' | head -n 1)" ".smoke-wheel"
          smoke_check "$(find dist -maxdepth 1 -name '*.tar.gz' | head -n 1)" ".smoke-sdist"

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish To PyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/card-framework/
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.0"

      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        run: uv publish
