vllm:
  base_url: "http://202.92.159.240:8001/v1"
  api_key: "EMPTY"
  timeout_seconds: 30
  chat_template_kwargs:
    enable_thinking: false

qa:
  input_guard:
    mode: "error"
    min_overlap_ratio: 0.03
    min_shared_tokens: 12
    min_shared_distinctive_tokens: 3
    min_shared_name_phrases: 2
  creator:
    max_generation_attempts: 8
    request_retries: 3
  corrector:
    enabled: true
    max_tokens: 700
    max_examples: 2
  evaluator:
    max_tool_turns: 320
    max_attempts_per_question: 3
    request_retries: 3
    chat_max_tokens: 160
    no_tool_call_patience: 3
    max_tool_calls_per_turn: 1
    per_question_concurrency: 100
    quote_relevance:
      mode: "hybrid"
      min_shared_tokens: 1
      min_distinctive_shared_tokens: 1
      min_token_length: 3
      semantic_threshold: null
      auto_repair: true
      repair_min_score: 0.25
      min_candidate_chars: 6
  timeouts:
    creator_request_seconds: 300
    evaluator_request_seconds: 1200
    server_stop_seconds: 10
