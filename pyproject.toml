[project]
name = "indextts"
version = "2.0.0"
description = "IndexTTS2: A Breakthrough in Emotionally Expressive and Duration-Controlled Auto-Regressive Zero-Shot Text-to-Speech"
authors = [{ name = "Bilibili IndexTTS Team" }]
license = "LicenseRef-Bilibili-IndexTTS"
license-files = ["LICEN[CS]E*", "INDEX_MODEL_LICENSE*"]
readme = "README.md"
classifiers = [
  "Development Status :: 5 - Production/Stable",

  "Intended Audience :: Science/Research",
  "Intended Audience :: Developers",

  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",

  "Natural Language :: English",
  "Natural Language :: Chinese (Simplified)",

  "Programming Language :: Python :: 3",

  "Operating System :: OS Independent",
]
requires-python = ">=3.10"
dependencies = [
  # IMPORTANT: Always run `uv lock` or `uv lock --upgrade` to resolve dependencies
  # and update the lockfile after editing anything below.
  # WARNING: Ensure that you don't have a local `uv.toml` which overrides PyPI
  # while generating the lockfile: https://github.com/astral-sh/uv/issues/15741

  # Core TTS Dependencies
  "accelerate==1.8.1",
  "cn2an==0.5.22",
  "cython==3.0.7",
  "descript-audiotools==0.7.2",
  "einops>=0.8.1",
  "ffmpeg-python==0.2.0",
  "g2p-en==2.1.0",
  "jieba==0.42.1",
  "json5==0.10.0",
  "keras==2.9.0",
  "librosa==0.10.2.post1",
  "matplotlib==3.8.2",
  "modelscope==1.27.0",
  "munch==4.0.0",
  "numba==0.60.0",
  "numpy==1.26.2",
  "omegaconf>=2.3.0",
  "opencv-python==4.9.0.80",
  "pandas==2.3.2",
  "safetensors==0.5.2",
  "sentencepiece>=0.2.1",
  "tensorboard==2.9.1",
  "textstat>=0.7.10",
  "tokenizers==0.21.0",
  "torch==2.8.*",
  "torchaudio==2.8.*",
  "tqdm>=4.67.1",
  "transformers==4.52.1",
  "bitsandbytes>=0.43.1",

  # Podcast Generation (LLM Interjections)
  "pydub>=0.25.1",
  "requests>=2.31.0",

  # Build tools (required for deepspeed with no-build-isolation)
  "setuptools>=75.0.0",

  # Use "wetext" on Windows/Mac, otherwise "WeTextProcessing" on Linux.
  "wetext>=0.0.9; sys_platform != 'linux'",
  "WeTextProcessing; sys_platform == 'linux'",
]

[project.optional-dependencies]
# To install the WebUI support, use `uv sync --extra webui` (or `--all-extras`).
webui = [
  "gradio==5.45.0",
]
# To install the DeepSpeed support, use `uv sync --extra deepspeed` (or `--all-extras`).
deepspeed = [
  "deepspeed==0.17.1",
]
# Speaker extraction and diarization (CARD-SpeakerAudioExtraction)
speaker-extraction = [
  "asteroid>=0.7.0,<1.0.0",
  "speechbrain>=1.0.0,<2.0.0",
  "pytorch-lightning>=2.0.0,<3.0.0",
  "openai-whisper>=20231117",
  "faster-whisper>=1.2.1",
  "pyannote.core>=5.0.0",
  "pyannote.database>=5.1.3",
  "pyannote.metrics>=3.2.1",
  "pyannote.pipeline>=3.0.1",
  "soundfile>=0.12.1,<1.0.0",
  "scipy>=1.11.0,<2.0.0",
  "scikit-learn>=1.7.0",
  "pesq>=0.0.4",
  "pystoi>=0.4.1",
  "mir_eval>=0.8.2",
  "pyloudnorm>=0.1.1",
  "rich>=14.0.0",
]
# Audio2Script + Summarizer pipeline (audio2script_and_summarizer module)
# NOTE: This uses pyannote.audio for diarization (compatible with core deps)
# The original NeMo MSDD diarizer (nemo-toolkit[asr]) has protobuf conflicts
# with descript-audiotools. Use a separate venv if NeMo is required.
audio2script = [
  # Diarization (using pyannote instead of NeMo for compatibility)
  "pyannote.audio>=3.3.0",
  "pyannote.core>=5.0.0",
  "pyannote.database>=5.1.3",
  "pyannote.metrics>=3.2.1",
  "pyannote.pipeline>=3.0.1",
  # NLP and tokenization
  "nltk>=3.8.1",
  # CLI UI
  "rich>=14.0.0",
  # LLM summarization
  "openai>=1.0.0",
  "pydantic>=2.0.0",
  # Git-based dependencies for audio processing
  "demucs @ git+https://github.com/MahmoudAshraf97/demucs.git",
  "deepmultilingualpunctuation @ git+https://github.com/oliverguhr/deepmultilingualpunctuation.git",
  "ctc-forced-aligner @ git+https://github.com/MahmoudAshraf97/ctc-forced-aligner.git",
  # Faster Whisper for transcription
  "faster-whisper>=1.1.0",
  # Pin ctranslate2 to avoid ROCm SDK detection issue on Windows (4.7.x tries to find AMD libs)
  "ctranslate2==4.5.0",
]
# Development and testing dependencies
dev = [
  "mypy>=1.11.2",
  "pytest>=9.0.0",
  "pytest-cov>=6.0.0",
  "ruff>=0.6.9",
]

[project.urls]
Homepage = "https://github.com/index-tts/index-tts"
Repository = "https://github.com/index-tts/index-tts.git"

[project.scripts]
# Set the installed binary names and entry points.
indextts = "indextts.cli:main"

[build-system]
# How to build the project as a CLI tool or PyPI package.
# NOTE: Use `uv tool install -e .` to install the package as a CLI tool.
requires = ["hatchling >= 1.27.0"]
build-backend = "hatchling.build"

[tool.ruff]
target-version = "py310"
line-length = 100
force-exclude = true
extend-exclude = [
  "voice-cloner-and-interjector",
  "benchmarks",
  "llm",
  "checkpoints",
]

[tool.ruff.lint]
select = ["F"]

[tool.mypy]
python_version = "3.10"
files = [
  "audio2script_and_summarizer",
  "CARD-SpeakerAudioExtraction/src",
  "tests",
]
exclude = "(?x)(^voice-cloner-and-interjector/|^benchmarks/|^llm/|^checkpoints/)"
follow_imports = "skip"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_return_any = true
no_implicit_optional = true
check_untyped_defs = true
pretty = true
show_error_codes = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--strict-config --strict-markers -ra --maxfail=1"

[tool.hatch.metadata]
# Allow git-based dependencies in optional-dependencies (e.g., audio2script extras)
allow-direct-references = true

[tool.hatch.build.targets.wheel]
# The indextts package is inside voice-cloner-and-interjector subdirectory
packages = ["voice-cloner-and-interjector/indextts"]

[tool.uv]
# Disable build isolation when building DeepSpeed from source.
# NOTE: This is *necessary* so that DeepSpeed builds directly within our `.venv`,
# and finds our CUDA-enabled version of PyTorch, which DeepSpeed *needs* during
# its compilation to determine what GPU support to compile for itself. It also
# saves time, since it won't waste time downloading a generic PyTorch version.
no-build-isolation-package = ["deepspeed"]

[tool.uv.sources]
# Install PyTorch with CUDA support on Linux/Windows (CUDA doesn't exist for Mac).
# NOTE: We must explicitly request them as `dependencies` above. These improved
# versions will not be selected if they're only third-party dependencies.
torch = [
  { index = "pytorch-cuda", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchaudio = [
  { index = "pytorch-cuda", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
  { index = "pytorch-cuda", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cuda"
# Use PyTorch built for NVIDIA Toolkit version 12.8.
# Available versions: https://pytorch.org/get-started/locally/
url = "https://download.pytorch.org/whl/cu128"
# Only use this index when explicitly requested by `tool.uv.sources`.
explicit = true
